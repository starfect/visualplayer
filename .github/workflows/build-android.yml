# Android release build (BLUEPRINT §15). Skeleton — enabled once `tauri android
# init` has generated the Gradle project. iOS is intentionally excluded (§13/§15).
name: Build Android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Guard until the Android project is initialized (gen/android committed).
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install frontend deps
        working-directory: app/main
        run: npm install

      - name: Build APK/AAB
        working-directory: app/main
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: npm run tauri android build
