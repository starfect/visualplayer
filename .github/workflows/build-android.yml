# Android release build, triggered by version tags. Initializes the Tauri Android
# project, builds an APK + AAB, and uploads them to the GitHub Release for the tag.
# iOS is intentionally excluded (separate Swift app, local Xcode builds only).
name: Build Android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Install frontend deps
        working-directory: app/main
        run: npm install

      - name: Initialize and build Android
        working-directory: app/main
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          npm run tauri android init -- --ci || true
          npm run tauri android build -- --apk --aab

      - name: Collect artifacts
        run: |
          mkdir -p dist-android
          find app/main/src-tauri/gen/android -name '*.apk' -exec cp {} dist-android/ \; || true
          find app/main/src-tauri/gen/android -name '*.aab' -exec cp {} dist-android/ \; || true
          ls -la dist-android || true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'VisualPlayer ${{ github.ref_name }}'
          body_path: resources/release.md
          files: dist-android/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
