name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Rust core (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # vp-core is dependency-free and tests without native libs.
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (vp-core)
        run: cargo clippy -p vp-core --all-targets -- -D warnings
      - name: Test (vp-core)
        run: cargo test -p vp-core

  tauri:
    name: Tauri backend (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install native deps (webkit2gtk + libmpv)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libmpv-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev
      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run build
