name: Version

# On every push to main, compute the next version from the number of changed
# files, bump it, commit, and push a `vX.Y.Z` tag. The tag triggers the desktop
# and Android release builds. The bump commit is marked [skip ci] to avoid loops.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Count changed files in this push
        id: count
        run: |
          BEFORE='${{ github.event.before }}'
          if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -z "$BEFORE" ]; then
            N=1
          else
            N=$(git diff --name-only "$BEFORE" HEAD | grep -v '^$' | wc -l | tr -d ' ')
          fi
          echo "n=$N" >> "$GITHUB_OUTPUT"
          echo "Changed files: $N"

      - name: Apply version bump
        id: bump
        run: node scripts/bump-version.mjs "${{ steps.count.outputs.n }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/main/package.json Cargo.toml app/main/src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"
