# Single push-driven release pipeline (no NSIS anywhere).
#
# - version: bump from changed-file count, commit, push.
# - prepare-release: create the GitHub Release for the tag (so every build job
#   just uploads assets to it; avoids cross-job races).
# - desktop-unix: macOS (.dmg) + Linux (.deb/.rpm/.AppImage) via tauri-action.
# - windows: build the app exe with cargo, embed it into the custom Tauri
#   installer (include_dir), and ship a single VisualPlayer-Setup-*.exe.
# - android: build a debug-signed .apk and upload it (runs independently so it is
#   never skipped by a desktop failure).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Count changed files
        id: count
        run: |
          BEFORE='${{ github.event.before }}'
          if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -z "$BEFORE" ]; then N=1; else N=$(git diff --name-only "$BEFORE" HEAD | grep -v '^$' | wc -l | tr -d ' '); fi
          echo "n=$N" >> "$GITHUB_OUTPUT"
      - name: Bump version
        id: bump
        run: node scripts/bump-version.mjs "${{ steps.count.outputs.n }}"
      - name: Commit and push bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main/package.json Cargo.toml app/main/src-tauri/tauri.conf.json installer/src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main

  prepare-release:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: VisualPlayer v${{ needs.version.outputs.version }}
          body_path: resources/release.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-unix:
    needs: [version, prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-latest
            target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libmpv-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install mpv
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Pin known-good dependency versions (no committed lockfile)
        run: |
          cargo generate-lockfile
          cargo update -p time --precise 0.3.49
      - name: Install frontend deps
        working-directory: app/main
        run: npm install
      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app/main
          args: ${{ matrix.target && format('--target {0} --features torrent', matrix.target) || '--features torrent' }}
      - name: Upload bundles
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            target/**/*.dmg
            target/**/*.deb
            target/**/*.rpm
            target/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    needs: [version, prepare-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build app frontend
        working-directory: app/main
        run: |
          npm install
          npm run build
      - name: Build installer frontend
        working-directory: installer
        run: |
          npm install
          npm run build
      - name: Pin known-good dependency versions (no committed lockfile)
        run: |
          cargo generate-lockfile
          cargo update -p time --precise 0.3.49
      # `custom-protocol` is required for a production build; without it the exe
      # runs in dev mode and loads http://localhost (the Tauri CLI sets it
      # automatically, but these are plain `cargo build` invocations).
      - name: Build app executable
        run: cargo build --release --features "torrent,custom-protocol" -p visualplayer
      - name: Assemble installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/src-tauri/payload | Out-Null
          Copy-Item target/release/visualplayer.exe installer/src-tauri/payload/ -Force
          Get-ChildItem target/release -Filter *.dll -ErrorAction SilentlyContinue | Copy-Item -Destination installer/src-tauri/payload/ -Force
      - name: Build custom installer (single exe, no NSIS)
        run: cargo build --release --features custom-protocol -p visualplayer-installer
      - name: Stage installer asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          Copy-Item target/release/visualplayer-installer.exe "dist-win/VisualPlayer-Setup-${{ needs.version.outputs.version }}.exe" -Force
      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist-win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Native Android app — a dedicated Flutter player (libmpv via media_kit), built
  # into per-ABI release APKs. Independent of the desktop Tauri build.
  android:
    needs: [version, prepare-release]
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Set app version
        working-directory: app/android
        run: |
          ver='${{ needs.version.outputs.version }}'
          sed -i "s/^version: .*/version: ${ver}+${{ github.run_number }}/" pubspec.yaml
      - name: Generate Android project
        working-directory: app/android
        run: flutter create --org dev.starfect --project-name visualplayer --platforms=android .
      - name: Customize Android manifest (label, permissions, media session, PiP)
        run: python3 scripts/flutter-android-manifest.py app/android
      - name: Make MainActivity host the background media session
        run: python3 scripts/flutter-android-mainactivity.py app/android
      - name: Force compileSdk 36 for all Gradle modules (plugins require it)
        run: python3 scripts/flutter-android-compilesdk.py app/android/android/build.gradle.kts
      - name: Configure release signing (when a keystore is set)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: app/android
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties
          python3 ../../scripts/flutter-android-signing.py android/app/build.gradle.kts
      - name: Build per-ABI release APKs
        working-directory: app/android
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release --split-per-abi
      - name: Stage APK assets
        run: |
          mkdir -p dist-android
          ver='${{ needs.version.outputs.version }}'
          for apk in app/android/build/app/outputs/flutter-apk/*-release.apk; do
            [ -f "$apk" ] || continue
            name="$(basename "$apk")"
            name="${name#app-}"
            cp "$apk" "dist-android/VisualPlayer-${ver}-${name}"
          done
          ls -la dist-android || true
      - name: Upload APKs
        if: hashFiles('dist-android/*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist-android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
