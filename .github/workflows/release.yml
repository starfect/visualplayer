# Single push-driven release pipeline (no NSIS anywhere).
#
# - version: bump from changed-file count, commit, push.
# - prepare-release: create the GitHub Release for the tag (so every build job
#   just uploads assets to it; avoids cross-job races).
# - desktop-unix: macOS (.dmg) + Linux (.deb/.rpm/.AppImage) via tauri-action.
# - windows: build the app exe with cargo, embed it into the custom Tauri
#   installer (include_dir), and ship a single VisualPlayer-Setup-*.exe.
# - android: build a debug-signed .apk and upload it (runs independently so it is
#   never skipped by a desktop failure).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Count changed files
        id: count
        run: |
          BEFORE='${{ github.event.before }}'
          if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -z "$BEFORE" ]; then N=1; else N=$(git diff --name-only "$BEFORE" HEAD | grep -v '^$' | wc -l | tr -d ' '); fi
          echo "n=$N" >> "$GITHUB_OUTPUT"
      - name: Bump version
        id: bump
        run: node scripts/bump-version.mjs "${{ steps.count.outputs.n }}"
      - name: Commit and push bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main/package.json Cargo.toml app/main/src-tauri/tauri.conf.json installer/src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main

  prepare-release:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: VisualPlayer v${{ needs.version.outputs.version }}
          body_path: resources/release.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-unix:
    needs: [version, prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-latest
            target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libmpv-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install mpv
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install frontend deps
        working-directory: app/main
        run: npm install
      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app/main
          args: ${{ matrix.target && format('--target {0} --features torrent', matrix.target) || '--features torrent' }}
      - name: Upload bundles
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            target/**/*.dmg
            target/**/*.deb
            target/**/*.rpm
            target/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    needs: [version, prepare-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build frontend
        working-directory: app/main
        run: |
          npm install
          npm run build
      - name: Build app executable
        run: cargo build --release --features torrent -p visualplayer
      - name: Assemble installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/src-tauri/payload | Out-Null
          Copy-Item target/release/visualplayer.exe installer/src-tauri/payload/ -Force
          Get-ChildItem target/release -Filter *.dll -ErrorAction SilentlyContinue | Copy-Item -Destination installer/src-tauri/payload/ -Force
      - name: Build custom installer (single exe, no NSIS)
        run: cargo build --release -p visualplayer-installer
      - name: Stage installer asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          Copy-Item target/release/visualplayer-installer.exe "dist-win/VisualPlayer-Setup-${{ needs.version.outputs.version }}.exe" -Force
      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist-win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    needs: [version, prepare-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
      - name: Install frontend deps
        working-directory: app/main
        run: npm install
      - name: Build APKs (signed per-ABI release when a keystore is configured)
        working-directory: app/main
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          npm run tauri android init -- --ci
          GEN=src-tauri/gen/android
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Keystore configured — building signed release APKs."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GEN/app/keystore.jks"
            {
              echo "password=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyPassword=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > "$GEN/keystore.properties"
            python3 ../../scripts/android-signing.py "$GEN/app/build.gradle.kts"
            npm run tauri android build -- --apk --split-per-abi
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — building debug APKs."
            npm run tauri android build -- --apk --split-per-abi --debug
          fi
      - name: Stage APK assets
        run: |
          mkdir -p dist-android
          ver='${{ needs.version.outputs.version }}'
          while IFS= read -r apk; do
            name="$(basename "$apk")"
            name="${name#app-}"
            cp "$apk" "dist-android/VisualPlayer-${ver}-${name}"
          done < <(find app/main/src-tauri/gen/android -path '*/outputs/apk/*' -name '*.apk')
          ls -la dist-android || true
      - name: Upload APKs
        if: hashFiles('dist-android/*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: dist-android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
