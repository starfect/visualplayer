# Desktop release build, triggered by the version tags pushed by version.yml.
# Builds Windows (x64/arm64), macOS (Intel/Apple Silicon), and Linux
# (deb/rpm/AppImage) and uploads them to the GitHub Release for the tag. Release
# notes come from resources/release.md.
name: Build Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --features torrent'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin --features torrent'
          - platform: ubuntu-latest
            args: '--features torrent'
          - platform: windows-latest
            args: '--features torrent'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libmpv-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install mpv

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64-apple') && 'aarch64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: app/main
        run: npm install

      - name: Read release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_EOF'
            cat resources/release.md
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app/main
          tagName: ${{ github.ref_name }}
          releaseName: 'VisualPlayer ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
