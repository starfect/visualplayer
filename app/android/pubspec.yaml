name: visualplayer
description: VisualPlayer — a native Android media player (libmpv via media_kit).
publish_to: "none"
version: 2.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.6
  shared_preferences: ^2.2.2
  file_picker: ^8.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
